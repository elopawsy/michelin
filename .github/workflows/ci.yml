name: CI

# Vérifie lint + build sur les PR et les branches (main est couvert par Deploy).
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # URL factice : `prisma generate` et `next build` n'ouvrent pas de connexion.
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-secret
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run lint
      - run: pnpm run build

  # Notification Discord uniquement si la CI échoue (évite le spam).
  notify-failure:
    needs: [verify]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notifier Discord (échec CI)
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK non configuré — notification ignorée."
            exit 0
          fi
          payload=$(jq -n \
            --arg url "$RUN_URL" --arg repo "$REPO" --arg branch "$BRANCH" --arg author "$ACTOR" \
            '{embeds:[{title:"❌ CI échouée",url:$url,color:15158332,fields:[
              {name:"Dépôt",value:$repo,inline:true},
              {name:"Branche",value:$branch,inline:true},
              {name:"Par",value:$author,inline:true}
            ],footer:{text:"GitHub Actions · CI"}}]}')
          curl -sf -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK"
