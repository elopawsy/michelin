name: CI

# Vérifie lint + build sur les PR et les branches (main est couvert par Deploy).
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # URL factice : `prisma generate` et `next build` n'ouvrent pas de connexion.
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-secret
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run lint
      - run: pnpm run build
