name: Deploy

# Build l'image Docker, la pousse sur GHCR, puis déploie sur le VPS via SSH.
on:
  push:
    branches: [main]

# Un seul déploiement à la fois (pas d'annulation en cours de route).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # packages:read → le GITHUB_TOKEN peut pull l'image privée du dépôt sur le VPS.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      # Garde le compose du VPS synchronisé avec le dépôt.
      - name: Copie du docker-compose.prod.yml
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.prod.yml
          target: /opt/michelin

      - name: Pull + up sur le VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GHCR_TOKEN,GH_OWNER
          script: |
            set -e
            cd /opt/michelin
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_OWNER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker logout ghcr.io
            docker image prune -f

  # Notification Discord (succès ou échec). No-op si DISCORD_WEBHOOK absent.
  notify:
    needs: [build-and-push, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notifier Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          OK: ${{ needs.build-and-push.result == 'success' && needs.deploy.result == 'success' }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK non configuré — notification ignorée."
            exit 0
          fi
          if [ "$OK" = "true" ]; then
            TITLE="✅ Déploiement réussi"; COLOR=3066993
          else
            TITLE="❌ Déploiement échoué"; COLOR=15158332
          fi
          payload=$(jq -n \
            --arg title "$TITLE" --arg url "$RUN_URL" --arg repo "$REPO" \
            --arg branch "$BRANCH" --arg sha "${SHA:0:7}" --arg author "$ACTOR" \
            --arg msg "${MSG%%$'\n'*}" --argjson color "$COLOR" \
            '{embeds:[{title:$title,url:$url,color:$color,fields:[
              {name:"Dépôt",value:$repo,inline:true},
              {name:"Branche",value:$branch,inline:true},
              {name:"Commit",value:$sha,inline:true},
              {name:"Par",value:$author,inline:true},
              {name:"Message",value:(if $msg=="" then "—" else $msg end)}
            ],footer:{text:"GitHub Actions · Deploy"}}]}')
          curl -sf -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK"
